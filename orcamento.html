<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gerador de Orçamento – MEI Seguro</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; color: #222; }

  .container { display: flex; flex-direction: column; gap: 20px; padding: 16px; max-width: 480px; margin: 0 auto; }

  .form-panel {
    background: #fff; border-radius: 12px; padding: 20px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .form-panel h2 { color: #1a3a5c; font-size: 17px; margin-bottom: 18px; border-bottom: 2px solid #1a3a5c; padding-bottom: 10px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; }
  .form-group input:focus { outline: none; border-color: #1a3a5c; }

  .section-title { font-size: 12px; font-weight: bold; color: #1a3a5c; margin: 16px 0 8px; border-left: 3px solid #1a3a5c; padding-left: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .servicos-list { display: flex; flex-direction: column; gap: 5px; }
  .servico-check { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border: 1px solid #e0e0e0; border-radius: 5px; cursor: pointer; }
  .servico-check:hover { background: #f5f8fc; }
  .servico-check input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #1a3a5c; }
  .servico-check label { cursor: pointer; font-size: 13px; flex: 1; }
  .bonus-label { font-size: 10px; font-weight: bold; color: #c0392b; background: #fde8e6; padding: 1px 6px; border-radius: 4px; margin-left: 4px; }

  .btn-print {
    width: 100%; padding: 11px; background: #1a3a5c; color: #fff;
    border: none; border-radius: 7px; font-size: 14px; font-weight: bold;
    cursor: pointer; margin-top: 18px; letter-spacing: 0.5px;
  }
  .btn-print:hover { background: #2c5282; }

  .preview-panel { width: 100%; }
  .preview-panel h2 { color: #1a3a5c; font-size: 15px; margin-bottom: 12px; }

  /* ── ORÇAMENTO ── */
  #orcamento {
    background: #fff; border-radius: 8px; padding: 18px 16px;
    max-width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif; font-size: 14px;
  }
  .o-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .o-hdr img { height:62px; width:auto; }
  .o-hdr-r { text-align:right; line-height:1.6; }
  .o-hdr-r .co { font-size:14px; font-weight:bold; color:#1a3a5c; }
  .o-hdr-r .ci { font-size:10px; color:#999; }
  .o-hr { border:none; border-top:2px solid #1a3a5c; margin-bottom:14px; }
  .o-ttl { text-align:center; margin-bottom:14px; }
  .o-ttl h1 { font-size:15px; font-weight:bold; color:#1a3a5c; margin-bottom:4px; letter-spacing:0.5px; }
  .o-ttl .sub { font-size:12px; color:#444; margin-bottom:2px; }
  .o-ttl .dt { font-size:10px; color:#aaa; }
  .o-sec { font-size:12px; font-weight:bold; color:#1a3a5c; margin:14px 0 7px; border-left:3px solid #1a3a5c; padding-left:7px; text-transform:uppercase; letter-spacing:0.5px; }

  /* Serviços */
  .srv-box { border:1px solid #d0dce8; border-radius:6px; overflow:hidden; margin-bottom:10px; }
  .srv-titulo { background:#1a3a5c; color:#fff; font-size:11px; font-weight:bold; padding:7px 10px; letter-spacing:0.5px; text-transform:uppercase; }
  .srv-item { font-size:12px; color:#333; padding:6px 10px; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between; }
  .srv-item:last-child { border-bottom:none; }
  .srv-item .check { color:#1a3a5c; font-weight:bold; font-size:13px; margin-right:6px; }
  .bonus-tag { font-size:9px; font-weight:bold; color:#c0392b; background:#fde8e6; padding:1px 5px; border-radius:3px; border:1px solid #e8a0a0; }

  /* Opção 1 */
  .op1-box { border:1px solid #d0dce8; border-radius:6px; overflow:hidden; margin-bottom:10px; }
  .op1-hdr { background:#2c4f7c; color:#fff; padding:8px 12px; font-size:12px; font-weight:bold; letter-spacing:0.3px; }
  .op1-body { background:#f7fafd; padding:12px; }
  .op1-valor { font-size:22px; font-weight:bold; color:#1a3a5c; margin-bottom:8px; }
  .op1-linha { display:flex; justify-content:space-between; font-size:12px; color:#555; padding:4px 0; border-bottom:1px solid #e8eef5; }
  .op1-linha:last-child { border-bottom:none; font-weight:bold; color:#1a3a5c; font-size:13px; }

  /* Opção 2 */
  .op2-box { border:1px solid #27ae60; border-radius:6px; overflow:hidden; margin-bottom:10px; }
  .op2-hdr { background:#27ae60; color:#fff; padding:8px 12px; font-size:12px; font-weight:bold; display:flex; justify-content:space-between; align-items:center; }
  .off-badge { background:#fff; color:#27ae60; font-weight:bold; font-size:11px; padding:2px 8px; border-radius:3px; letter-spacing:0.3px; }
  .op2-body { background:#f0faf4; padding:12px; }
  .op2-de { font-size:11px; color:#bbb; text-decoration:line-through; margin-bottom:2px; }
  .op2-valor { font-size:26px; font-weight:bold; color:#1e8449; margin-bottom:8px; }
  .validade-bar { background:#c0392b; color:#fff; text-align:center; padding:7px; font-size:11px; font-weight:bold; letter-spacing:0.3px; }

  /* Google */
  .google-box { border:1px solid #e0e0e0; border-radius:6px; padding:10px 12px; margin-top:8px; text-align:center; background:#fafafa; }
  .google-box .g-title { font-size:12px; font-weight:bold; color:#1a3a5c; margin-bottom:4px; }
  .google-box .g-stars { font-size:16px; color:#f4c430; letter-spacing:2px; margin-bottom:4px; }
  .google-box .g-link { font-size:10px; color:#666; word-break:break-all; line-height:1.5; }

  .o-ftr { text-align:center; font-size:10px; color:#bbb; margin-top:14px; padding-top:10px; border-top:1px solid #ddd; }

  @media print {
    @page { margin: 0; size: auto; }
    html, body { background:#fff; margin:0; padding:0; }
    .form-panel, .preview-panel > h2 { display:none !important; }
    .container { padding:0; margin:0; max-width:100%; }
    .preview-panel { width:100%; }
    #orcamento { box-shadow:none; max-width:100%; border-radius:0; padding:14px 12px; }
  }
</style>
</head>

<div class="container">

  <!-- FORMULÁRIO -->
  <div class="form-panel">
    <h2>Gerador de Orçamento</h2>

    <div class="section-title">Dados do Cliente</div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="nome" value="Nome do Cliente" oninput="atualizar()"/>

      <label>CNPJ</label>

    </div>
    <div class="form-group">
      <label>Data de Emissão</label>
      <input type="text" id="data" value="28/03/2026" oninput="atualizar()"/>
    </div>
    <div class="form-group">
      <label>Validade da Oferta</label>
      <input type="text" id="validade" value="29/03/2026" oninput="atualizar()"/>
    </div>
    <!-- campos fixos ocultos -->
    <input type="hidden" id="v_total" value="224"/>
    <input type="hidden" id="v_entrada" value="100"/>
    <input type="hidden" id="prazo" value="7 dias"/>
    <input type="hidden" id="desc_pct" value="32"/>
    <input type="hidden" id="link_google" value="share.google/8jvc8bdusgSf9r6qA"/>

    <button class="btn-print" onclick="window.print()">Imprimir / Salvar PDF</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <h2>Preview</h2>
    <div id="orcamento"></div>
  </div>
</div>
